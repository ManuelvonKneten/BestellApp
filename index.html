<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
    <link rel="icon" href="./assets/icons/takeout_dining_2.png" type="image/png">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">

    <script src="./script.js" defer></script>
    <script src="./scripts/dishes.js"></script>
    <script src="./scripts/templates.js" defer></script>

</head>

<body onload="init()">

    <header class="header">
        <div class="header_wrapper">
            <div class="header_left">
            <img src="./assets/icons/takeout_dining_2.svg" alt="bestell_app" class="logo">
            <img src="./assets/icons/Bestell APP.png" alt="bestell_app" class="logo">
            </div>
            <div class="head_right">
            <img src="./assets/icons/menu.png" alt="menu" class="menu">
            </div>
        </div>
    </header>

    <section class="hero">
        <img src="./assets/icons/logo.png" alt="logo">
    </section>

    <div class="text_line">
        <div class="headline-row">
            <h1 class="logo">
                <span class="burger">Burger</span><span class="house">House</span>
            </h1>
            <div class="rate">
                <img src="./assets/icons/star.svg" alt="star icon" />
                <span><b>4,1</b></span>
                <p>(317)</p>
            </div>
        </div>
    <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
</div>

    <div class="content_wrapper">

        <section class="content">

            <div class="section_border"><img src="./assets/img/burger.png" alt="logo"> <h2>Burger & Sandwiches</h2></div>
            <div class="contentDishesBurger"></div>

            <div class="section_border"><img src="./assets/img/Pizza.png" alt="logo"><h2>Pizza (30cm)</h2></div>
            <div class="contentDishesPizza"></div>

            <div class="section_border"><img src="./assets/img/Salad.png" alt="logo"><h2>Salad</h2></div>
            <div class="contentDishesSalad"></div>

            <div class="section_border"><img src="./assets/img/Salad.png" alt="logo"><h2>Pasta</h2></div>
            <div class="contentDishesPasta"></div>

        </section>

        <aside id="basket" class="basket_wrapper">

    <div class="basket">

        <div class="basket-header">
            <h2>Your Basket</h2>

            <button class="basket-close-btn" onclick="hideBasket()">
                ×
            </button>
        </div>

        <div class="basket-dishes">
            <div id="basketItems"></div>
        </div>

        <div class="basket_summary">
            <button class="buy_button" onclick="buyNow()">
                Buy Now
            </button>
        </div>

    </div>

</aside>


    <div id="orderDialog" class="orderDialog hidden">
    <div class="carAnimation">
        <img src="./assets/icons/car.svg" alt="Delivery">
    </div>

    <h2>Order confirmed!</h2>
    <p>Your food is on the way!</p>

    <button class="dialog_closeX" onclick="closeDialog()">
        x
    </button>
</div>

    
    </div>

    <footer>
        <a href="#">&copy; 2025 BurgerHouse </a>
        <a href="#">Imprint </a>
        <a href="#">Cookie Preference </a>
    </footer>

<div class="footerNav" id="footerNav">
  <div class="footerNavContainer">

    <a href="#top" class="navItem">
    <img src="./assets/icons/home.svg" alt="Home" />
    </a>

    <a href="#" class="navItem navButton" onclick="openProfile(event)">
    <img src="./assets/icons/person.svg" alt="Customer Profile" />
    </a>

     <a href="#" class="navItem navButton" onclick="openProfile(event)">
    <img src="./assets/icons/orders.svg" alt="orders" />
    </a>

    <a href="#basket" class="navItem navButton basketNavIconBtn" onclick="scrollToBasket(event)">
    <img src="./assets/icons/shopping_cart.svg" alt="Basket" />
    <span id="basketCount">0</span>
    </a>

  </div>
</div>

</body>
</html>
